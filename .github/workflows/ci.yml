name: SentinelGRC CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest -v test_sentinelgrc.py test_governance.py test_ingestion_api.py test_workflow.py test_state_store.py test_agent_keys.py test_pipeline.py test_pipeline_worker.py test_job_queue.py test_audit_log.py

      - name: Parse PowerShell agents
        shell: pwsh
        run: |
          $paths = @(
            "$PWD/agent/Export-SecurityPosture.ps1",
            "$PWD/agent/Export-ADAccessReview.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $path,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List
              exit 1
            }
          }
